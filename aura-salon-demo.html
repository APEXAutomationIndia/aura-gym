<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Salon & Studio — AI Receptionist</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0e0e0e;
    color: #f0ede8;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 420px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: #141414;
  }

  .header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    gap: 14px;
    background: #141414;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c9a96e, #e8d5b0);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .header-info h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    font-weight: 400;
    color: #f0ede8;
    letter-spacing: 0.01em;
  }

  .header-info p {
    font-size: 11px;
    color: #5ebd78;
    font-weight: 300;
    letter-spacing: 0.04em;
    margin-top: 2px;
  }

  .powered {
    margin-left: auto;
    font-size: 9px;
    color: #444;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 0; }

  .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.55;
    font-weight: 300;
  }

  .msg.bot {
    background: #1e1e1e;
    color: #e8e4de;
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    border: 1px solid #282828;
  }

  .msg.user {
    background: linear-gradient(135deg, #c9a96e, #b8924f);
    color: #0e0e0e;
    border-bottom-right-radius: 4px;
    align-self: flex-end;
    font-weight: 400;
  }

  .typing {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 16px;
    background: #1e1e1e;
    border: 1px solid #282828;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    width: fit-content;
    align-self: flex-start;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #c9a96e;
    animation: bounce 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .input-area {
    padding: 16px;
    border-top: 1px solid #222;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: #141414;
  }

  .input-area textarea {
    flex: 1;
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 12px 16px;
    color: #f0ede8;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    resize: none;
    outline: none;
    max-height: 100px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  .input-area textarea::placeholder { color: #444; }
  .input-area textarea:focus { border-color: #c9a96e44; }

  .send-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c9a96e, #b8924f);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
  }

  .send-btn:hover { opacity: 0.9; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 18px; height: 18px; fill: #0e0e0e; }

  .branding {
    text-align: center;
    padding: 8px;
    font-size: 10px;
    color: #333;
    letter-spacing: 0.05em;
  }

  .lang-badge {
    display: inline-block;
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 10px;
    color: #888;
    margin-bottom: 8px;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="avatar">✦</div>
    <div class="header-info">
      <h1>Aura Salon & Studio</h1>
      <p>● Online — AI Receptionist</p>
    </div>
    <span class="powered">Jaipur</span>
  </div>

  <div class="messages" id="messages">
    <div class="msg bot">Welcome to Aura Salon & Studio. How can I assist you today?</div>
  </div>

  <div class="input-area">
    <textarea 
      id="input" 
      placeholder="Type in English या Hindi में..." 
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="branding">Powered by AI · Aura Salon & Studio</div>
</div>

<script>
  const WEBHOOK_URL = 'https://dnuzkp7hym6o.share.zrok.io/webhook/0d6d9a3e-8079-4e04-a717-6d7660e3d71e/chat';
  
  let sessionId = 'session_' + Math.random().toString(36).substr(2, 9);
  let isWaiting = false;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function addMessage(text, type) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function showTyping() {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing';
    div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    if (isWaiting) return;
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    addMessage(text, 'user');
    
    isWaiting = true;
    document.getElementById('sendBtn').disabled = true;
    showTyping();

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          chatInput: text,
          sessionId: sessionId
        })
      });

      const data = await response.json();
      removeTyping();
      
      let reply = data.output || data.text || data.message || data.response || 'Sorry, something went wrong.';
      
      // Strip BOOKING_DATA from response
      if (reply.includes('BOOKING_DATA')) {
        reply = reply.split('BOOKING_DATA')[0].trim();
      }
      
      addMessage(reply, 'bot');
    } catch (err) {
      removeTyping();
      addMessage('Connection issue — please try again.', 'bot');
    }

    isWaiting = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('input').focus();
  }
</script>
</body>
</html>
